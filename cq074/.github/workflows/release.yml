name: Package ConnectIQ Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: v0.6.0
  push:
    tags: ['v*']
jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm ci
        working-directory: functions
      - name: Build release ZIP
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: connectiq-${{ inputs.version || github.ref_name }}
          path: release-output/*.zip
