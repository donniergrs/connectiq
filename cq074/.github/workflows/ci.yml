name: ConnectIQ CI
on:
  push:
    branches: [main, release-v0.5.0-advisor-workspace, 'release/**']
  pull_request:
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Verify functions dependencies
        working-directory: functions
        run: npm ci
